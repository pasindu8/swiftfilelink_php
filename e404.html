<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWIFTFILELINK - 404 Route Not Found</title>
    <link rel="icon" href="http://www.swiftfilelink.rf.gd/logo2.png" sizes="32x32">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800;900&family=Exo+2:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/modernizr/2.8.3/modernizr.min.js" type="text/javascript"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css">

    <style type="text/css">
        /* Global Cyber Matrix Background Setup */
        body {
            background-color: #0b0d13;
            font-family: 'Exo 2', sans-serif;
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Scanline Overlay Effect for Cyberpunk Vibe */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* Flexbox Layout Structure Wrapper */
        .error-container {
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 1000px;
            width: 90%;
            gap: 40px;
            z-index: 2;
        }

        /* Abstract Animated SVG Polygons Frame */
        svg {
            width: 380px;
            height: auto;
            max-height: 450px;
            filter: drop-shadow(0 0 15px rgba(255, 51, 51, 0.15));
        }

        /* Glitch Control Panel Terminal */
        .message-box {
            flex: 1;
            font-weight: 400;
        }

        .message-box h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 100px;
            font-weight: 900;
            line-height: 1;
            color: #ff3333; /* Crimson Red Main Accent */
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 51, 51, 0.5);
            letter-spacing: -2px;
        }

        .message-box h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 700;
            text-transform: uppercase;
            color: #ffffff;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .message-box p {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.6;
            margin-bottom: 35px;
            max-width: 400px;
        }

        /* Interactive Action Buttons Logic group */
        .buttons-con .action-link-wrap {
            display: flex;
            gap: 15px;
        }

        .buttons-con .action-link-wrap a {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px 28px;
            border-radius: 6px;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        /* "Go Back" Cyberpunk Outline Action Variant */
        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.4);
        }

        /* "Go Home" Crimson Red Main Focus Button Action */
        .btn-primary {
            background: rgba(255, 51, 51, 0.1);
            color: #ff3333;
            border: 1px solid #ff3333;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.15);
        }

        .btn-primary:hover {
            background: #ff3333;
            color: #0b0d13;
            box-shadow: 0 0 25px rgba(255, 51, 51, 0.4);
            transform: translateY(-2px);
        }

        /* Floating Geometries Vector Animations Matrix */
        #Polygon-1, #Polygon-2, #Polygon-3, #Polygon-4, #Polygon-5 {
            animation: float 2.5s infinite ease-in-out alternate;
        }
        #Polygon-1 { stroke: #ff3333; animation-delay: 0s; }
        #Polygon-2 { stroke: rgba(255,255,255,0.2); animation-delay: 0.3s; }
        #Polygon-3 { stroke: rgba(255, 51, 51, 0.4); animation-delay: 0.6s; }
        #Polygon-4 { stroke: rgba(255,255,255,0.4); animation-delay: 0.9s; }
        #Polygon-5 { stroke: #ff3333; animation-delay: 1.2s; }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(25px) rotate(1.5deg); }
        }

        /* Responsive UI Grids system optimization rules */
        @media (max-width: 768px) {
            .error-container {
                flex-direction: column;
                text-align: center;
                gap: 20px;
                margin-top: 40px;
            }
            svg {
                width: 260px;
            }
            .message-box p {
                margin: 0 auto 30px auto;
            }
            .buttons-con .action-link-wrap {
                justify-content: center;
                flex-direction: column;
                gap: 12px;
            }
            .message-box h1 {
                font-size: 80px;
            }
        }
    </style>
</head>
<body>

    <div class="error-container">
        
        <svg viewBox="0 0 837 1045" version="1.1" xmlns="http://www.w3.org/2000/svg">
            <g id="Page-1" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
                <path d="M353,9 L626.664028,170 L626.664028,487 L353,642 L79.3359724,487 L79.3359724,170 L353,9 Z" id="Polygon-1" stroke-width="7"></path>
                <path d="M78.5,529 L147,569.186414 L147,648.311216 L78.5,687 L10,648.311216 L10,569.186414 L78.5,529 Z" id="Polygon-2" stroke-width="6"></path>
                <path d="M773,186 L827,217.538705 L827,279.636651 L773,310 L719,279.636651 L719,217.538705 L773,186 Z" id="Polygon-3" stroke-width="6"></path>
                <path d="M639,529 L773,607.846761 L773,763.091627 L639,839 L505,763.091627 L505,607.846761 L639,529 Z" id="Polygon-4" stroke-width="6"></path>
                <path d="M281,801 L383,861.025276 L383,979.21169 L281,1037 L179,979.21169 L179,861.025276 L281,801 Z" id="Polygon-5" stroke-width="7"></path>
            </g>
        </svg>

        <div class="message-box">
            <h1>404</h1>
            <h2>Route Decryption Failed</h2>
            <p>The requested directory node does not exist or has been permanently scrubbed from the main mainframe database layer.</p>
            
            <div class="buttons-con">
                <div class="action-link-wrap">
                    <a onclick="history.back()" class="btn-secondary">Return Link</a>
                    <a href="http://www.swiftfilelink.rf.gd" class="btn-primary">Main Dashboard</a>
                </div>
            </div>
        </div>

    </div>

    <script src='//cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js'></script>
</body>
</html>
